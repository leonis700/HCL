<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>寻字游戏 — Term 1.7 街舞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  background: #f0ebe3;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
  overflow: hidden;
}
#app {
  width: 100%;
  max-width: 520px;
  padding: 12px;
  position: relative;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px 14px;
  font-size: 15px;
  color: #555;
  font-weight: 700;
}
.top-bar .score { color: #2a7a3e; font-size: 18px; }
.top-bar .level { color: #666; }
.top-bar .progress { color: #888; }
.grid-wrap {
  position: relative;
  background: #e6dfd5;
  border-radius: 14px;
  padding: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  aspect-ratio: 1;
}
.cell {
  background: #fff;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(20px, 5vw, 28px);
  font-weight: 700;
  color: #222;
  cursor: default;
  transition: background 0.15s, transform 0.1s, opacity 0.2s;
  aspect-ratio: 1;
}
.cell.active { cursor: pointer; }
.cell.active:hover { background: #e3f0ff; }
.cell.active:active { transform: scale(0.93); }
.cell.selected {
  background: #f5a623 !important;
  color: #fff !important;
  cursor: default;
}
.cell.used-correct {
  background: #a5d6a7 !important;
  color: #fff !important;
  opacity: 0.7;
  cursor: default;
}
.hint-area {
  margin: 10px 0 4px;
  text-align: center;
}
.hint-area .pinyin-hint {
  font-size: 20px;
  color: #666;
  font-weight: 700;
  letter-spacing: 1px;
}
.hint-area .meaning-hint {
  font-size: 15px;
  color: #999;
  font-weight: 400;
  margin-top: 2px;
  line-height: 1.3;
}
.answer-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 16px 0 8px;
  min-height: 48px;
}
.slot {
  width: 44px;
  height: 44px;
  border: 2.5px dashed #bbb;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  color: #222;
  background: #faf8f5;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
}
.slot.filled {
  border-style: solid;
  border-color: #f5a623;
  background: #fff3e0;
  animation: slotPop 0.2s ease;
}
.slot.correct {
  border-color: #2e7d32;
  background: #c8e6c9;
}
.slot.wrong {
  border-color: #c62828;
  background: #ffcdd2;
  animation: shake 0.3s ease;
}
@keyframes slotPop {
  0% { transform: scale(0.7); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-4px); }
}
.status {
  text-align: center;
  font-size: 17px;
  font-weight: 700;
  min-height: 32px;
  line-height: 32px;
  color: #555;
}
.status.correct-msg { color: #2e7d32; }
.status.wrong-msg { color: #c62828; }
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.overlay.show { opacity: 1; pointer-events: auto; }
.overlay .clue-chinese {
  font-size: clamp(42px, 10vw, 62px);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  margin-bottom: 6px;
  letter-spacing: 6px;
}
.overlay .clue-pinyin {
  font-size: clamp(18px, 4vw, 26px);
  color: rgba(255,255,255,0.7);
  font-weight: 400;
  margin-bottom: 4px;
}
.overlay .clue-meaning {
  font-size: clamp(13px, 2.5vw, 17px);
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  margin-bottom: 10px;
  padding: 0 20px;
  text-align: center;
  line-height: 1.3;
  max-width: 80vw;
}
.overlay .clue-pinyin-only {
  font-size: clamp(28px, 6vw, 40px);
  color: #fff;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 2px;
}
.overlay .timer {
  font-size: clamp(56px, 14vw, 80px);
  font-weight: 900;
  color: #ffd54f;
  text-shadow: 0 0 20px rgba(255,213,79,0.3);
}
.overlay .subline {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-top: 6px;
}
.menu-screen, .complete-screen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.menu-screen.show, .complete-screen.show { opacity: 1; pointer-events: auto; }
.menu-screen h1 {
  font-size: 36px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 4px;
  letter-spacing: 2px;
}
.menu-screen .sub {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 32px;
}
.menu-screen .btn-row {
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}
.menu-screen .btn {
  padding: 14px 48px;
  font-size: 20px;
  font-weight: 700;
  font-family: inherit;
  border: 2px solid #ffd54f;
  border-radius: 12px;
  background: transparent;
  color: #ffd54f;
  cursor: pointer;
  min-width: 220px;
  transition: transform 0.15s, background 0.2s;
}
.menu-screen .btn:hover { background: rgba(255,213,79,0.1); }
.menu-screen .btn:active { transform: scale(0.95); }
.menu-screen .btn.primary {
  background: #ffd54f;
  color: #333;
}
.menu-screen .btn.primary:hover { background: #ffca28; }
.menu-screen .btn-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}
.complete-screen h2 {
  font-size: 32px;
  color: #fff;
  margin-bottom: 6px;
}
.complete-screen .sub {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 24px;
}
.complete-screen .final-score {
  font-size: 56px;
  font-weight: 900;
  color: #ffd54f;
  margin-bottom: 20px;
}
.complete-screen .breakdown {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  justify-content: center;
  max-width: 360px;
  margin-bottom: 28px;
}
.complete-screen .breakdown span {
  font-size: 16px;
  color: rgba(255,255,255,0.8);
}
.complete-screen .breakdown .ok { color: #81c784; }
.complete-screen .breakdown .no { color: #e57373; }
.complete-screen .btn-row {
  display: flex;
  gap: 14px;
  justify-content: center;
}
.complete-screen .btn {
  padding: 12px 28px;
  font-size: 18px;
  font-weight: 700;
  font-family: inherit;
  border: 2px solid #ffd54f;
  border-radius: 10px;
  background: transparent;
  color: #ffd54f;
  cursor: pointer;
  transition: transform 0.15s, background 0.2s;
}
.complete-screen .btn:hover { background: rgba(255,213,79,0.1); }
.complete-screen .btn:active { transform: scale(0.95); }
.complete-screen .btn.primary {
  background: #ffd54f;
  color: #333;
}
.complete-screen .btn.primary:hover { background: #ffca28; }
@media (max-width: 420px) {
  #app { padding: 6px; }
  .grid-wrap { padding: 5px; }
  .grid { gap: 3px; }
  .cell { font-size: 18px; border-radius: 4px; }
  .slot { width: 38px; height: 38px; font-size: 18px; }
  .top-bar { font-size: 13px; padding: 4px 2px 8px; }
  .hint-area .meaning-hint { font-size: 13px; }
  .menu-screen h1 { font-size: 28px; }
  .menu-screen .btn { font-size: 17px; padding: 12px 36px; min-width: 180px; }
}
</style>
</head>
<body>

<div id="app">
  <div class="top-bar">
    <span class="score">&#9733; <span id="scoreDisplay">0</span></span>
    <span class="level" id="levelDisplay">Level 1</span>
    <span class="progress" id="progressDisplay">1 / 9</span>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="hint-area">
    <div class="pinyin-hint" id="pinyinHint"></div>
    <div class="meaning-hint" id="meaningHint"></div>
  </div>

  <div class="answer-row" id="answerRow"></div>

  <div class="status" id="statusMsg">Find the characters in order</div>
</div>

<div class="overlay" id="overlay">
  <div class="clue-chinese" id="clueChinese"></div>
  <div class="clue-pinyin" id="cluePinyin"></div>
  <div class="clue-meaning" id="clueMeaning"></div>
  <div class="clue-pinyin-only" id="cluePinyinOnly"></div>
  <div class="timer" id="timerDisplay">8</div>
  <div class="subline" id="sublineText">Get ready...</div>
</div>

<div class="menu-screen" id="menuScreen">
  <h1>&#x5BFB;&#x5B57;&#x6E38;&#x620F;</h1>
  <div class="sub">Term 1.7 &mdash; &#x8857;&#x821E;</div>
  <div class="btn-row">
    <div>
      <button class="btn primary" id="menuLevel1">Level 1</button>
      <div class="btn-desc">See Chinese + pinyin + meaning</div>
    </div>
    <div>
      <button class="btn" id="menuLevel2">Level 2</button>
      <div class="btn-desc">See pinyin + meaning only</div>
    </div>
  </div>
</div>

<div class="complete-screen" id="completeScreen">
  <h2 id="completeTitle">Level 1 Complete</h2>
  <div class="sub" id="completeSub">Great effort!</div>
  <div class="final-score" id="completeScore">0</div>
  <div class="breakdown" id="breakdown"></div>
  <div class="btn-row">
    <button class="btn" id="replayBtn">Replay Level 1</button>
    <button class="btn primary" id="continueBtn">Continue</button>
  </div>
</div>

<script>
const PHRASES = [
  { chinese: '精彩演绎', pinyin: '(jīng cǎi yǎn yì)', meaning: 'brilliant performance or interpretation' },
  { chinese: '晴天霹雳', pinyin: '(qíng tiān pī lì)', meaning: 'a bolt from the blue; sudden, shocking event' },
  { chinese: '配合默契', pinyin: '(pèi hé mò qì)', meaning: 'to work together in perfect harmony; well-coordinated' },
  { chinese: '顾名思义', pinyin: '(gù míng sī yì)', meaning: 'as the name implies; as the term suggests' },
  { chinese: '青春靓丽', pinyin: '(qīng chūn liàng lì)', meaning: 'young and beautiful; fresh and attractive' },
  { chinese: '迷恋游戏', pinyin: '(mí liàn yóu xì)', meaning: 'addicted to gaming; obsessed with games' },
  { chinese: '容光焕发', pinyin: '(róng guāng huàn fā)', meaning: 'glowing with health and vitality; radiant' },
  { chinese: '雨后春笋', pinyin: '(yǔ hòu chūn sǔn)', meaning: 'to spring up like bamboo shoots after rain; rapid proliferation' },
  { chinese: '绚丽多彩', pinyin: '(xuàn lì duō cǎi)', meaning: 'gorgeous and colourful; resplendent' },
];

const TIMER_SECONDS = 8;
const COLS = 6, ROWS = 6;
const GRID_SIZE = COLS * ROWS;
const PHRASE_COUNT = PHRASES.length;

function buildExclusionSet() {
  const s = new Set();
  for (const p of PHRASES) for (const ch of p.chinese) s.add(ch);
  return s;
}
const COMMON_CHARS = '的一是不了人我在有他这中大为上个国到以说时会就也要来用子生自作之如可意者方好于其当面心学开前所发民然道后事行内因经而多公司法成月得想能现等日情头部正点明将相名定关外但看间种高美此门与长从业回见力问由只命无气很请几位那路带公件教管活又常白少很给你手文安们光通民处调习都家地水去火电时理物重工生知性有体合做主知中平及万亲表代位分各做才听西给原指七入千数军目队色东世区决示保山北小世市集增更效极交决受信精五求据才海接维认即讲价达石议根计共部证究量程级技术制史型识林确除使组统号选专许转改走等准团据完厂整收选型领车半引强际土王每厂思件存列品清养造须完府';

const EXCLUDED = buildExclusionSet();

function randomFiller() {
  let ch;
  do { ch = COMMON_CHARS[Math.random() * COMMON_CHARS.length | 0]; }
  while (EXCLUDED.has(ch));
  return ch;
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.random() * (i + 1) | 0;
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildGrid() {
  const chars = [];
  for (const p of PHRASES) for (const ch of p.chinese) chars.push(ch);
  shuffle(chars);
  const grid = chars.slice(0, GRID_SIZE);
  while (grid.length < GRID_SIZE) grid.push(randomFiller());
  return shuffle(grid);
}

function shufflePhrases() {
  levelPhrases = shuffle([...PHRASES]);
}

const gridEl = document.getElementById('grid');
const answerRow = document.getElementById('answerRow');
const statusMsg = document.getElementById('statusMsg');
const scoreDisplay = document.getElementById('scoreDisplay');
const levelDisplay = document.getElementById('levelDisplay');
const progressDisplay = document.getElementById('progressDisplay');

const overlay = document.getElementById('overlay');
const clueChinese = document.getElementById('clueChinese');
const cluePinyin = document.getElementById('cluePinyin');
const clueMeaning = document.getElementById('clueMeaning');
const cluePinyinOnly = document.getElementById('cluePinyinOnly');
const timerDisplay = document.getElementById('timerDisplay');
const sublineText = document.getElementById('sublineText');

const menuScreen = document.getElementById('menuScreen');
const completeScreen = document.getElementById('completeScreen');
const completeTitle = document.getElementById('completeTitle');
const completeSub = document.getElementById('completeSub');
const completeScore = document.getElementById('completeScore');
const breakdown = document.getElementById('breakdown');
const replayBtn = document.getElementById('replayBtn');
const continueBtn = document.getElementById('continueBtn');

let state = 'idle';
let gridData = [];
let cellElements = [];
let currentLevel = 0;
let currentPhrase = 0;
let levelPhrases = [];
let score = 0;
let clickedIndices = [];
let attempts = 0;
let levelResults = [];
let timerId = null;
let timerVal = TIMER_SECONDS;

function advance() {
  if (state === 'feedback' || state === 'idle' || state === 'play') return;
  clearInterval(timerId);
  overlay.classList.remove('show');
  setTimeout(startPlay, 350);
}

function startReveal() {
  state = 'reveal';
  const p = levelPhrases[currentPhrase];
  const isL1 = currentLevel === 0;

  clueChinese.textContent = isL1 ? p.chinese : '';
  clueChinese.style.display = isL1 ? '' : 'none';
  cluePinyin.textContent = isL1 ? p.pinyin : '';
  cluePinyin.style.display = isL1 ? '' : 'none';
  clueMeaning.textContent = p.meaning;
  clueMeaning.style.display = '';
  cluePinyinOnly.textContent = isL1 ? '' : p.pinyin;
  cluePinyinOnly.style.display = isL1 ? 'none' : '';

  timerVal = TIMER_SECONDS;
  timerDisplay.textContent = timerVal;
  sublineText.textContent = 'Get ready...';
  overlay.classList.add('show');

  clearInterval(timerId);
  timerId = setInterval(() => {
    timerVal--;
    timerDisplay.textContent = Math.max(timerVal, 0);
    if (timerVal <= 0) {
      clearInterval(timerId);
      overlay.classList.remove('show');
      setTimeout(startPlay, 350);
    }
  }, 1000);
}

function startPlay() {
  if (state === 'feedback') return;
  state = 'play';
  clickedIndices = [];
  attempts = 0;
  clearCellSelection();
  const p = levelPhrases[currentPhrase];
  document.getElementById('pinyinHint').textContent = p.pinyin;
  document.getElementById('meaningHint').textContent = p.meaning;
  renderAnswerSlots(p.chinese.length);
  updateStatus('Find the characters in order', '');
  enableActiveCells(true);
}

function renderAnswerSlots(n) {
  answerRow.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const div = document.createElement('div');
    div.className = 'slot';
    answerRow.appendChild(div);
  }
}

function fillNextSlot(char) {
  const slots = answerRow.querySelectorAll('.slot');
  for (const s of slots) {
    if (!s.classList.contains('filled')) {
      s.textContent = char;
      s.classList.add('filled');
      return s;
    }
  }
}

function clearSlots() {
  answerRow.querySelectorAll('.slot').forEach(s => {
    s.textContent = '';
    s.className = 'slot';
  });
}

function clearCellSelection() {
  for (const el of cellElements) el.classList.remove('selected');
}

function updateStatus(msg, cls) {
  statusMsg.textContent = msg;
  statusMsg.className = 'status' + (cls ? ' ' + cls : '');
}

function enableActiveCells(enabled) {
  for (let i = 0; i < cellElements.length; i++) {
    const el = cellElements[i];
    if (gridData[i].used) continue;
    el.classList.toggle('active', enabled);
  }
}

function undoLast() {
  if (state !== 'play' || clickedIndices.length === 0) return;
  const idx = clickedIndices.pop();
  const el = cellElements[idx];
  el.classList.remove('selected');
  const slots = answerRow.querySelectorAll('.slot');
  for (let i = slots.length - 1; i >= 0; i--) {
    if (slots[i].classList.contains('filled')) {
      slots[i].textContent = '';
      slots[i].className = 'slot';
      break;
    }
  }
  updateStatus('Find the characters in order', '');
  enableActiveCells(true);
}

function handleCellClick(index) {
  if (state !== 'play') return;
  const cell = gridData[index];
  if (cell.used) return;
  const el = cellElements[index];
  if (el.classList.contains('selected')) return;

  const phraseLen = levelPhrases[currentPhrase].chinese.length;
  if (clickedIndices.length >= phraseLen) return;

  clickedIndices.push(index);
  el.classList.add('selected');
  fillNextSlot(cell.char);

  if (clickedIndices.length === phraseLen) {
    enableActiveCells(false);
    state = 'checking';
    setTimeout(checkAnswer, 500);
  }
}

function checkAnswer() {
  const p = levelPhrases[currentPhrase];
  const expected = [...p.chinese];
  const got = clickedIndices.map(i => gridData[i].char);
  const correct = expected.every((c, i) => c === got[i]);

  const slots = answerRow.querySelectorAll('.slot');
  if (correct) {
    attempts++;
    const fullPts = p.chinese.length * 10;
    const pts = attempts > 1 ? Math.round(fullPts / 2) : fullPts;
    score += pts;
    scoreDisplay.textContent = score;
    slots.forEach(s => s.classList.add('correct'));
    const label = attempts > 1 ? 'Correct (+' + pts + ' pts, half)' : 'Correct! +' + pts + ' pts';
    updateStatus(label, 'correct-msg');
    for (const i of clickedIndices) {
      gridData[i].used = true;
      cellElements[i].classList.remove('selected');
      cellElements[i].classList.add('used-correct');
    }
    levelResults.push(true);
    state = 'feedback';
    setTimeout(nextPhrase, 2000);
  } else {
    slots.forEach(s => s.classList.add('wrong'));
    attempts++;
    if (attempts >= 2) {
      updateStatus('Wrong! \u2714 ' + p.chinese, 'wrong-msg');
      levelResults.push(false);
      state = 'feedback';
      setTimeout(nextPhrase, 2000);
    } else {
      updateStatus('Try again! Click the right characters...', 'wrong-msg');
      state = 'play';
      setTimeout(() => {
        clearSlots();
        clearCellSelection();
        clickedIndices = [];
        enableActiveCells(true);
      }, 1000);
    }
  }
}

function nextPhrase() {
  currentPhrase++;
  if (currentPhrase >= PHRASE_COUNT) {
    showLevelComplete();
    return;
  }
  updateProgress();
  clearSlots();
  clearCellSelection();
  startReveal();
}

function showLevelComplete() {
  state = 'idle';
  const isL1 = currentLevel === 0;
  completeTitle.textContent = isL1 ? 'Level 1 Complete' : 'Game Complete!';
  completeSub.textContent = isL1
    ? 'Ready for Level 2? (pinyin only!)'
    : 'You finished both levels!';
  completeScore.textContent = score;

  breakdown.innerHTML = '';
  levelResults.forEach((ok, i) => {
    const span = document.createElement('span');
    span.className = ok ? 'ok' : 'no';
    span.textContent = (i + 1) + '. ' + (ok ? '\u2713' : '\u2717');
    breakdown.appendChild(span);
  });

  if (isL1) {
    continueBtn.textContent = 'Start Level 2';
    continueBtn.className = 'btn primary';
    continueBtn.onclick = startLevel2;
    replayBtn.style.display = '';
    replayBtn.className = 'btn';
    replayBtn.onclick = replayLevel1;
  } else {
    continueBtn.textContent = 'Back to Menu';
    continueBtn.className = 'btn primary';
    continueBtn.onclick = showMenu;
    replayBtn.style.display = 'none';
  }
  completeScreen.classList.add('show');
}

function startLevel(level) {
  menuScreen.classList.remove('show');
  completeScreen.classList.remove('show');
  currentLevel = level;
  currentPhrase = 0;
  score = 0;
  levelResults = [];
  scoreDisplay.textContent = '0';
  levelDisplay.textContent = level === 0 ? 'Level 1' : 'Level 2';
  shufflePhrases();
  buildAndRenderGrid();
  updateProgress();
  setTimeout(() => startReveal(), 400);
}

function startLevel2() {
  startLevel(1);
}

function replayLevel1() {
  startLevel(0);
}

function showMenu() {
  completeScreen.classList.remove('show');
  menuScreen.classList.add('show');
}

function updateProgress() {
  progressDisplay.textContent = (currentPhrase + 1) + ' / 9';
}

function buildAndRenderGrid() {
  const raw = buildGrid();
  gridData = raw.map((ch, i) => ({ char: ch, used: false, index: i }));
  gridEl.innerHTML = '';
  cellElements = [];
  for (let i = 0; i < GRID_SIZE; i++) {
    const div = document.createElement('div');
    div.className = 'cell';
    div.textContent = gridData[i].char;
    div.dataset.index = i;
    div.addEventListener('click', () => handleCellClick(i));
    gridEl.appendChild(div);
    cellElements.push(div);
  }
}

answerRow.addEventListener('click', e => {
  const slot = e.target.closest('.slot');
  if (slot && slot.classList.contains('filled')) undoLast();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'reveal') advance();
    else if (completeScreen.classList.contains('show')) continueBtn.click();
    else if (menuScreen.classList.contains('show')) document.getElementById('menuLevel1').click();
  }
  if (e.code === 'Backspace' || e.code === 'Delete') {
    e.preventDefault();
    undoLast();
  }
});

overlay.addEventListener('click', advance);

document.getElementById('menuLevel1').addEventListener('click', () => startLevel(0));
document.getElementById('menuLevel2').addEventListener('click', () => startLevel(1));

function init() {
  menuScreen.classList.add('show');
}

init();
</script>
</body>
</html>
